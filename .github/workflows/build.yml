name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate project files
        run: |
          mkdir -p app/src/main/java/com/wallpaperapp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # ── AndroidManifest.xml ──────────────────────────────────────────
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.wallpaperapp">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.SET_WALLPAPER" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.WallpaperApp"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity android:name=".SettingsActivity" android:exported="false"/>
                  <activity
                      android:name=".CaptureActivity"
                      android:exported="false"
                      android:theme="@style/Theme.Transparent"
                      android:excludeFromRecents="true"/>
                  <receiver android:name=".BootReceiver" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOF

          # ── MainActivity.kt ──────────────────────────────────────────────
          cat > app/src/main/java/com/wallpaperapp/MainActivity.kt << 'EOF'
          package com.wallpaperapp
          import android.content.Intent
          import android.os.Bundle
          import android.widget.Button
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import androidx.work.*
          import java.util.Calendar
          import java.util.concurrent.TimeUnit
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  findViewById<Button>(R.id.settingsButton).setOnClickListener {
                      startActivity(Intent(this, SettingsActivity::class.java))
                  }
                  val statusText = findViewById<TextView>(R.id.statusText)
                  findViewById<Button>(R.id.updateNowButton).setOnClickListener {
                      startActivity(Intent(this, CaptureActivity::class.java))
                      statusText.text = "⏳ Capturing page — wallpaper will update shortly!"
                  }
                  scheduleDailyUpdate()
              }
              override fun onResume() {
                  super.onResume()
                  val prefs = getSharedPreferences("WallpaperPrefs", MODE_PRIVATE)
                  findViewById<TextView>(R.id.urlText).text =
                      prefs.getString("url", "https://www.google.com")
                  findViewById<TextView>(R.id.lastUpdatedText).text =
                      "Last updated: ${prefs.getString("last_updated", "Never")}"
              }
              private fun scheduleDailyUpdate() {
                  val now = Calendar.getInstance()
                  val target = Calendar.getInstance().apply {
                      set(Calendar.HOUR_OF_DAY, 1); set(Calendar.MINUTE, 0)
                      set(Calendar.SECOND, 0); set(Calendar.MILLISECOND, 0)
                      if (!after(now)) add(Calendar.DAY_OF_YEAR, 1)
                  }
                  val req = PeriodicWorkRequestBuilder<WallpaperWorker>(24, TimeUnit.HOURS)
                      .setInitialDelay(target.timeInMillis - now.timeInMillis, TimeUnit.MILLISECONDS)
                      .setConstraints(
                          Constraints.Builder().setRequiredNetworkType(NetworkType.CONNECTED).build()
                      ).build()
                  WorkManager.getInstance(this).enqueueUniquePeriodicWork(
                      "DailyWallpaper", ExistingPeriodicWorkPolicy.UPDATE, req
                  )
              }
          }
          EOF

          # ── CaptureActivity.kt ───────────────────────────────────────────
          # This is the key fix: a real window so WebView renders properly,
          # then PixelCopy captures it accurately, then the activity finishes.
          cat > app/src/main/java/com/wallpaperapp/CaptureActivity.kt << 'EOF'
          package com.wallpaperapp
          import android.app.WallpaperManager
          import android.content.Context
          import android.graphics.Bitmap
          import android.graphics.PixelFormat
          import android.os.Build
          import android.os.Bundle
          import android.os.Handler
          import android.os.Looper
          import android.util.Log
          import android.view.ViewTreeObserver
          import android.webkit.WebResourceError
          import android.webkit.WebResourceRequest
          import android.webkit.WebView
          import android.webkit.WebViewClient
          import android.widget.Toast
          import androidx.annotation.RequiresApi
          import androidx.appcompat.app.AppCompatActivity
          import java.text.SimpleDateFormat
          import java.util.*
          import android.view.PixelCopy

          class CaptureActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private val handler = Handler(Looper.getMainLooper())

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_capture)
                  webView = findViewById(R.id.captureWebView)
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      loadWithOverviewMode = true
                      useWideViewPort = true
                  }
                  val prefs = getSharedPreferences("WallpaperPrefs", Context.MODE_PRIVATE)
                  val url = prefs.getString("url", "https://www.google.com") ?: "https://www.google.com"
                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageFinished(view: WebView, url: String) {
                          // Wait for JS/layout to settle, then capture
                          handler.postDelayed({ captureAndSetWallpaper() }, 3500)
                      }
                      override fun onReceivedError(
                          view: WebView, request: WebResourceRequest, error: WebResourceError
                      ) {
                          if (request.isForMainFrame) {
                              Toast.makeText(this@CaptureActivity,
                                  "Failed to load page: ${error.description}", Toast.LENGTH_LONG).show()
                              finish()
                          }
                      }
                  }
                  webView.loadUrl(url)
              }

              private fun captureAndSetWallpaper() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      captureWithPixelCopy()
                  } else {
                      captureWithDraw()
                  }
              }

              @RequiresApi(Build.VERSION_CODES.O)
              private fun captureWithPixelCopy() {
                  val bitmap = Bitmap.createBitmap(webView.width, webView.height, Bitmap.Config.ARGB_8888)
                  PixelCopy.request(window, bitmap, { result ->
                      if (result == PixelCopy.SUCCESS) {
                          applyWallpaper(bitmap)
                      } else {
                          Log.w("Capture", "PixelCopy failed ($result), falling back to draw()")
                          captureWithDraw()
                      }
                  }, handler)
              }

              private fun captureWithDraw() {
                  try {
                      webView.isDrawingCacheEnabled = true
                      val bitmap = Bitmap.createBitmap(webView.drawingCache)
                      webView.isDrawingCacheEnabled = false
                      applyWallpaper(bitmap)
                  } catch (e: Exception) {
                      Toast.makeText(this, "Capture failed: ${e.message}", Toast.LENGTH_LONG).show()
                      finish()
                  }
              }

              private fun applyWallpaper(bitmap: Bitmap) {
                  try {
                      WallpaperManager.getInstance(this).setBitmap(bitmap)
                      val ts = SimpleDateFormat("dd MMM yyyy, HH:mm", Locale.getDefault()).format(Date())
                      getSharedPreferences("WallpaperPrefs", Context.MODE_PRIVATE)
                          .edit().putString("last_updated", ts).apply()
                      Toast.makeText(this, "✅ Wallpaper updated!", Toast.LENGTH_SHORT).show()
                  } catch (e: Exception) {
                      Toast.makeText(this, "Failed to set wallpaper: ${e.message}", Toast.LENGTH_LONG).show()
                  } finally {
                      finish()
                  }
              }

              override fun onDestroy() {
                  super.onDestroy()
                  handler.removeCallbacksAndMessages(null)
                  webView.destroy()
              }
          }
          EOF

          # ── WallpaperWorker.kt (for scheduled 1am job) ───────────────────
          # Launches CaptureActivity so it also has a real window
          cat > app/src/main/java/com/wallpaperapp/WallpaperWorker.kt << 'EOF'
          package com.wallpaperapp
          import android.content.Context
          import android.content.Intent
          import androidx.work.Worker
          import androidx.work.WorkerParameters
          class WallpaperWorker(context: Context, params: WorkerParameters) : Worker(context, params) {
              override fun doWork(): Result {
                  val intent = Intent(applicationContext, CaptureActivity::class.java).apply {
                      addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                  }
                  applicationContext.startActivity(intent)
                  return Result.success()
              }
          }
          EOF

          # ── SettingsActivity.kt ──────────────────────────────────────────
          cat > app/src/main/java/com/wallpaperapp/SettingsActivity.kt << 'EOF'
          package com.wallpaperapp
          import android.os.Bundle
          import android.widget.Button
          import android.widget.EditText
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          class SettingsActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_settings)
                  supportActionBar?.title = "Settings"
                  supportActionBar?.setDisplayHomeAsUpEnabled(true)
                  val urlInput = findViewById<EditText>(R.id.urlInput)
                  val prefs = getSharedPreferences("WallpaperPrefs", MODE_PRIVATE)
                  urlInput.setText(prefs.getString("url", "https://www.google.com"))
                  findViewById<Button>(R.id.saveButton).setOnClickListener {
                      var url = urlInput.text.toString().trim()
                      if (url.isEmpty()) {
                          Toast.makeText(this, "Please enter a URL", Toast.LENGTH_SHORT).show()
                          return@setOnClickListener
                      }
                      if (!url.startsWith("http")) url = "https://$url"
                      prefs.edit().putString("url", url).apply()
                      Toast.makeText(this, "✅ URL saved!", Toast.LENGTH_SHORT).show()
                      finish()
                  }
              }
              override fun onSupportNavigateUp(): Boolean {
                  onBackPressedDispatcher.onBackPressed(); return true
              }
          }
          EOF

          # ── BootReceiver.kt ──────────────────────────────────────────────
          cat > app/src/main/java/com/wallpaperapp/BootReceiver.kt << 'EOF'
          package com.wallpaperapp
          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import androidx.work.*
          import java.util.Calendar
          import java.util.concurrent.TimeUnit
          class BootReceiver : BroadcastReceiver() {
              override fun onReceive(context: Context, intent: Intent) {
                  if (intent.action != Intent.ACTION_BOOT_COMPLETED) return
                  val now = Calendar.getInstance()
                  val target = Calendar.getInstance().apply {
                      set(Calendar.HOUR_OF_DAY, 1); set(Calendar.MINUTE, 0)
                      set(Calendar.SECOND, 0); set(Calendar.MILLISECOND, 0)
                      if (!after(now)) add(Calendar.DAY_OF_YEAR, 1)
                  }
                  val req = PeriodicWorkRequestBuilder<WallpaperWorker>(24, TimeUnit.HOURS)
                      .setInitialDelay(target.timeInMillis - now.timeInMillis, TimeUnit.MILLISECONDS)
                      .setConstraints(
                          Constraints.Builder().setRequiredNetworkType(NetworkType.CONNECTED).build()
                      ).build()
                  WorkManager.getInstance(context).enqueueUniquePeriodicWork(
                      "DailyWallpaper", ExistingPeriodicWorkPolicy.UPDATE, req
                  )
              }
          }
          EOF

          # ── activity_capture.xml (fullscreen invisible WebView) ──────────
          cat > app/src/main/res/layout/activity_capture.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <WebView
                  android:id="@+id/captureWebView"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>
          </FrameLayout>
          EOF

          # ── activity_main.xml ────────────────────────────────────────────
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:fillViewport="true" android:background="#F5F5F5">
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                android:orientation="vertical" android:padding="24dp" android:gravity="center_horizontal">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="🌐 Web Wallpaper" android:textSize="28sp" android:textStyle="bold"
                  android:textColor="#1A1A2E" android:layout_marginTop="24dp" android:layout_marginBottom="4dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Sets your wallpaper from a webpage every day at 1 AM"
                  android:textSize="13sp" android:textColor="#777777" android:layout_marginBottom="28dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="CURRENT URL" android:textSize="11sp" android:textStyle="bold"
                  android:textColor="#9E9E9E" android:layout_marginBottom="4dp"/>
              <TextView android:id="@+id/urlText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="https://www.google.com"
                  android:textSize="15sp" android:textColor="#1A73E8" android:layout_marginBottom="20dp"/>
              <TextView android:id="@+id/lastUpdatedText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Last updated: Never"
                  android:textSize="13sp" android:textColor="#666666" android:layout_marginBottom="8dp"/>
              <TextView android:id="@+id/statusText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="✅ Scheduled — runs daily at 1:00 AM"
                  android:textSize="13sp" android:textColor="#4CAF50" android:layout_marginBottom="28dp"/>
              <Button android:id="@+id/updateNowButton" android:layout_width="match_parent"
                  android:layout_height="56dp" android:text="Update Wallpaper Now"
                  android:backgroundTint="#1A73E8" android:layout_marginBottom="12dp"/>
              <Button android:id="@+id/settingsButton" android:layout_width="match_parent"
                  android:layout_height="56dp" android:text="⚙️  Settings"
                  android:backgroundTint="#E0E0E0" android:textColor="#333333"/>
            </LinearLayout>
          </ScrollView>
          EOF

          # ── activity_settings.xml ────────────────────────────────────────
          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="24dp" android:background="#F5F5F5">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="Webpage URL" android:textSize="16sp" android:textStyle="bold"
                android:textColor="#1A1A2E" android:layout_marginTop="24dp" android:layout_marginBottom="8dp"/>
            <EditText android:id="@+id/urlInput" android:layout_width="match_parent"
                android:layout_height="wrap_content" android:hint="https://example.com"
                android:inputType="textUri" android:padding="12dp" android:layout_marginBottom="16dp"/>
            <Button android:id="@+id/saveButton" android:layout_width="match_parent"
                android:layout_height="52dp" android:text="Save URL" android:backgroundTint="#1A73E8"/>
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:layout_marginTop="24dp"
                android:text="💡 Dashboards, maps and news sites work great.\nMake sure the device has internet at 1 AM."
                android:textSize="13sp" android:textColor="#888888" android:lineSpacingMultiplier="1.5"/>
          </LinearLayout>
          EOF

          # ── String / color / theme resources ───────────────────
