name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate project files
        run: |
          mkdir -p app/src/main/java/com/wallpaperapp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p .github/workflows

          # ── AndroidManifest.xml ──────────────────────────────────────────
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.wallpaperapp">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.SET_WALLPAPER" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.WallpaperApp"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity android:name=".SettingsActivity" android:exported="false"/>
                  <receiver android:name=".BootReceiver" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          MANIFEST

          # ── MainActivity.kt ──────────────────────────────────────────────
          cat > app/src/main/java/com/wallpaperapp/MainActivity.kt << 'KOTLIN'
          package com.wallpaperapp
          import android.content.Intent
          import android.os.Bundle
          import android.widget.Button
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import androidx.work.*
          import java.util.Calendar
          import java.util.concurrent.TimeUnit
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  findViewById<Button>(R.id.settingsButton).setOnClickListener {
                      startActivity(Intent(this, SettingsActivity::class.java))
                  }
                  val statusText = findViewById<TextView>(R.id.statusText)
                  findViewById<Button>(R.id.updateNowButton).setOnClickListener {
                      WorkManager.getInstance(this).enqueue(OneTimeWorkRequestBuilder<WallpaperWorker>().build())
                      statusText.text = "⏳ Update triggered — give it a moment!"
                  }
                  scheduleDailyUpdate()
              }
              override fun onResume() {
                  super.onResume()
                  val prefs = getSharedPreferences("WallpaperPrefs", MODE_PRIVATE)
                  findViewById<TextView>(R.id.urlText).text = prefs.getString("url", "https://www.google.com")
                  findViewById<TextView>(R.id.lastUpdatedText).text = "Last updated: ${prefs.getString("last_updated", "Never")}"
              }
              private fun scheduleDailyUpdate() {
                  val now = Calendar.getInstance()
                  val target = Calendar.getInstance().apply {
                      set(Calendar.HOUR_OF_DAY, 1); set(Calendar.MINUTE, 0)
                      set(Calendar.SECOND, 0); set(Calendar.MILLISECOND, 0)
                      if (!after(now)) add(Calendar.DAY_OF_YEAR, 1)
                  }
                  val req = PeriodicWorkRequestBuilder<WallpaperWorker>(24, TimeUnit.HOURS)
                      .setInitialDelay(target.timeInMillis - now.timeInMillis, TimeUnit.MILLISECONDS)
                      .setConstraints(Constraints.Builder().setRequiredNetworkType(NetworkType.CONNECTED).build())
                      .build()
                  WorkManager.getInstance(this).enqueueUniquePeriodicWork("DailyWallpaper", ExistingPeriodicWorkPolicy.UPDATE, req)
              }
          }
          KOTLIN

          # ── SettingsActivity.kt ──────────────────────────────────────────
          cat > app/src/main/java/com/wallpaperapp/SettingsActivity.kt << 'KOTLIN'
          package com.wallpaperapp
          import android.os.Bundle
          import android.widget.Button
          import android.widget.EditText
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          class SettingsActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_settings)
                  supportActionBar?.title = "Settings"
                  supportActionBar?.setDisplayHomeAsUpEnabled(true)
                  val urlInput = findViewById<EditText>(R.id.urlInput)
                  val prefs = getSharedPreferences("WallpaperPrefs", MODE_PRIVATE)
                  urlInput.setText(prefs.getString("url", "https://www.google.com"))
                  findViewById<Button>(R.id.saveButton).setOnClickListener {
                      var url = urlInput.text.toString().trim()
                      if (url.isEmpty()) { Toast.makeText(this, "Please enter a URL", Toast.LENGTH_SHORT).show(); return@setOnClickListener }
                      if (!url.startsWith("http")) url = "https://$url"
                      prefs.edit().putString("url", url).apply()
                      Toast.makeText(this, "✅ URL saved!", Toast.LENGTH_SHORT).show()
                      finish()
                  }
              }
              override fun onSupportNavigateUp(): Boolean { onBackPressedDispatcher.onBackPressed(); return true }
          }
          KOTLIN

          # ── WallpaperWorker.kt ───────────────────────────────────────────
          cat > app/src/main/java/com/wallpaperapp/WallpaperWorker.kt << 'KOTLIN'
          package com.wallpaperapp
          import android.app.WallpaperManager
          import android.content.Context
          import android.graphics.Bitmap
          import android.graphics.Canvas
          import android.graphics.Color
          import android.os.Handler
          import android.os.Looper
          import android.util.Log
          import android.view.View
          import android.webkit.*
          import androidx.work.Worker
          import androidx.work.WorkerParameters
          import java.text.SimpleDateFormat
          import java.util.*
          import java.util.concurrent.CountDownLatch
          import java.util.concurrent.TimeUnit
          class WallpaperWorker(context: Context, params: WorkerParameters) : Worker(context, params) {
              override fun doWork(): Result {
                  val prefs = applicationContext.getSharedPreferences("WallpaperPrefs", Context.MODE_PRIVATE)
                  val url = prefs.getString("url", "https://www.google.com") ?: "https://www.google.com"
                  val dm = applicationContext.resources.displayMetrics
                  val width = dm.widthPixels; val height = dm.heightPixels
                  val latch = CountDownLatch(1)
                  var bitmap: Bitmap? = null
                  Handler(Looper.getMainLooper()).post {
                      try {
                          val wv = WebView(applicationContext)
                          wv.setBackgroundColor(Color.WHITE)
                          wv.settings.apply { javaScriptEnabled = true; domStorageEnabled = true; loadWithOverviewMode = true; useWideViewPort = true }
                          wv.measure(View.MeasureSpec.makeMeasureSpec(width, View.MeasureSpec.EXACTLY), View.MeasureSpec.makeMeasureSpec(height, View.MeasureSpec.EXACTLY))
                          wv.layout(0, 0, width, height)
                          wv.webViewClient = object : WebViewClient() {
                              override fun onPageFinished(view: WebView, url: String) {
                                  view.postDelayed({
                                      try {
                                          val bmp = Bitmap.createBitmap(width, height, Bitmap.Config.ARGB_8888)
                                          view.draw(Canvas(bmp)); bitmap = bmp
                                      } catch (e: Exception) { Log.e("WW", "Screenshot failed", e) }
                                      finally { latch.countDown() }
                                  }, 4000)
                              }
                              override fun onReceivedError(view: WebView, req: WebResourceRequest, err: WebResourceError) { if (req.isForMainFrame) latch.countDown() }
                          }
                          wv.loadUrl(url)
                      } catch (e: Exception) { latch.countDown() }
                  }
                  if (!latch.await(60, TimeUnit.SECONDS) || bitmap == null) return Result.retry()
                  return try {
                      WallpaperManager.getInstance(applicationContext).setBitmap(bitmap)
                      val ts = SimpleDateFormat("dd MMM yyyy, HH:mm", Locale.getDefault()).format(Date())
                      prefs.edit().putString("last_updated", ts).apply()
                      Result.success()
                  } catch (e: Exception) { Result.failure() }
              }
          }
          KOTLIN

          # ── BootReceiver.kt ──────────────────────────────────────────────
          cat > app/src/main/java/com/wallpaperapp/BootReceiver.kt << 'KOTLIN'
          package com.wallpaperapp
          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import androidx.work.*
          import java.util.Calendar
          import java.util.concurrent.TimeUnit
          class BootReceiver : BroadcastReceiver() {
              override fun onReceive(context: Context, intent: Intent) {
                  if (intent.action != Intent.ACTION_BOOT_COMPLETED) return
                  val now = Calendar.getInstance()
                  val target = Calendar.getInstance().apply {
                      set(Calendar.HOUR_OF_DAY, 1); set(Calendar.MINUTE, 0); set(Calendar.SECOND, 0); set(Calendar.MILLISECOND, 0)
                      if (!after(now)) add(Calendar.DAY_OF_YEAR, 1)
                  }
                  val req = PeriodicWorkRequestBuilder<WallpaperWorker>(24, TimeUnit.HOURS)
                      .setInitialDelay(target.timeInMillis - now.timeInMillis, TimeUnit.MILLISECONDS)
                      .setConstraints(Constraints.Builder().setRequiredNetworkType(NetworkType.CONNECTED).build())
                      .build()
                  WorkManager.getInstance(context).enqueueUniquePeriodicWork("DailyWallpaper", ExistingPeriodicWorkPolicy.UPDATE, req)
              }
          }
          KOTLIN

          # ── activity_main.xml ────────────────────────────────────────────
          cat > app/src/main/res/layout/activity_main.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:fillViewport="true" android:background="#F5F5F5">
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                android:orientation="vertical" android:padding="24dp" android:gravity="center_horizontal">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="🌐 Web Wallpaper" android:textSize="28sp" android:textStyle="bold"
                  android:textColor="#1A1A2E" android:layout_marginTop="24dp" android:layout_marginBottom="4dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Sets your wallpaper from a webpage every day at 1 AM"
                  android:textSize="13sp" android:textColor="#777777" android:layout_marginBottom="28dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="CURRENT URL" android:textSize="11sp" android:textStyle="bold"
                  android:textColor="#9E9E9E" android:layout_marginBottom="4dp"/>
              <TextView android:id="@+id/urlText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="https://www.google.com"
                  android:textSize="15sp" android:textColor="#1A73E8" android:layout_marginBottom="20dp"/>
              <TextView android:id="@+id/lastUpdatedText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Last updated: Never"
                  android:textSize="13sp" android:textColor="#666666" android:layout_marginBottom="8dp"/>
              <TextView android:id="@+id/statusText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="✅ Scheduled — runs daily at 1:00 AM"
                  android:textSize="13sp" android:textColor="#4CAF50" android:layout_marginBottom="28dp"/>
              <Button android:id="@+id/updateNowButton" android:layout_width="match_parent"
                  android:layout_height="56dp" android:text="Update Wallpaper Now"
                  android:backgroundTint="#1A73E8" android:layout_marginBottom="12dp"/>
              <Button android:id="@+id/settingsButton" android:layout_width="match_parent"
                  android:layout_height="56dp" android:text="⚙️  Settings"
                  android:backgroundTint="#E0E0E0" android:textColor="#333333"/>
            </LinearLayout>
          </ScrollView>
          XML

          # ── activity_settings.xml ────────────────────────────────────────
          cat > app/src/main/res/layout/activity_settings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="24dp" android:background="#F5F5F5">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="Webpage URL" android:textSize="16sp" android:textStyle="bold"
                android:textColor="#1A1A2E" android:layout_marginTop="24dp" android:layout_marginBottom="8dp"/>
            <EditText android:id="@+id/urlInput" android:layout_width="match_parent"
                android:layout_height="wrap_content" android:hint="https://example.com"
                android:inputType="textUri" android:padding="12dp" android:layout_marginBottom="16dp"/>
            <Button android:id="@+id/saveButton" android:layout_width="match_parent"
                android:layout_height="52dp" android:text="Save URL" android:backgroundTint="#1A73E8"/>
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:layout_marginTop="24dp"
                android:text="💡 Dashboards, maps and news sites work great.\nMake sure the device has internet at 1 AM."
                android:textSize="13sp" android:textColor="#888888" android:lineSpacingMultiplier="1.5"/>
          </LinearLayout>
          XML

          # ── Resource values ──────────────────────────────────────────────
          cat > app/src/main/res/values/strings.xml << 'XML'
          <resources><string name="app_name">Web Wallpaper</string></resources>
          XML

          cat > app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="blue_primary">#1A73E8</color>
              <color name="blue_dark">#1557B0</color>
              <color name="white">#FFFFFFFF</color>
              <color name="black">#FF000000</color>
          </resources>
          XML

          cat > app/src/main/res/values/themes.xml << 'XML'
          <resources>
              <style name="Theme.WallpaperApp" parent="Theme.MaterialComponents.Light.DarkActionBar">
                  <item name="colorPrimary">@color/blue_primary</item>
                  <item name="colorPrimaryDark">@color/blue_dark</item>
                  <item name="colorAccent">@color/blue_primary</item>
              </style>
          </resources>
          XML

          # ── Gradle files ─────────────────────────────────────────────────
          cat > settings.gradle << 'GRADLE'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "WallpaperApp"
          include ':app'
          GRADLE

          cat > build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          GRADLE

          cat > gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          PROPS

          cat > app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.wallpaperapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.wallpaperapp"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = '1.8' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.work:work-runtime-ktx:2.9.0'
          }
          GRADLE

          cat > app/proguard-rules.pro << 'PRO'
          -keep class com.wallpaperapp.** { *; }
          PRO

          echo "✅ All project files generated"

      - name: Set up Gradle wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebWallpaper-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
